services:
  - type: web
    name: kalvikonnect-backend
    env: node
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kalvikonnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://kalvikonnect.netlify.app

databases:
  - name: kalvikonnect-db
    databaseName: kalvikonnect
    user: kalvikonnect
